name: Post Claude Cross-Repo Response

on:
  repository_dispatch:
    types: [claude-cross-repo-response]

jobs:
  post-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post response to source issue
        uses: actions/github-script@v7
        env:
          TARGET_REPO: ${{ github.event.client_payload.repo }}
          TARGET_ISSUE: ${{ github.event.client_payload.issue_number }}
          RUN_URL: ${{ github.event.client_payload.run_url }}
        with:
          github-token: ${{ secrets.CORE_TEAM_ISSUES_COMMENT_TOKEN }}
          script: |
            const [owner, repo] = process.env.TARGET_REPO.split('/');
            const issueNumber = parseInt(process.env.TARGET_ISSUE, 10);
            const runUrl = process.env.RUN_URL;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: `Claude finished processing this request. [See workflow run](${runUrl})`
            });
